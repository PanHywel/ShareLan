name: Build ShareLan

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          cd frontend && npm install && npm run build
          cd ../backend && cp -r ../frontend/dist dist
          CGO_ENABLED=1 go build -o sharelan-macos-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: sharelan-macos
          path: backend/sharelan-macos-amd64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          cd frontend
          npm install
          npm run build
        shell: bash
      - run: |
          copy-item -path frontend/dist -destination backend/dist -recurse
          cd backend
          $env:CGO_ENABLED=1
          go build -o sharelan-windows-amd64.exe .
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: sharelan-windows
          path: backend/sharelan-windows-amd64.exe
