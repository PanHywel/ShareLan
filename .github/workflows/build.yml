name: Build ShareLan

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          cd frontend && npm install && npm run build
          cd ../backend && cp -r ../frontend/dist dist
          CGO_ENABLED=1 GOARCH=amd64 go build -o sharelan-macos-x86_64 .
          # 创建 .app 包
          mkdir -p ../ShareLan.app/Contents/MacOS
          cp sharelan-macos-x86_64 ../ShareLan.app/Contents/MacOS/sharelan
          chmod +x ../ShareLan.app/Contents/MacOS/sharelan
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n<key>CFBundleExecutable</key>\n<string>sharelan</string>\n<key>CFBundleIdentifier</key>\n<string>com.sharelan.app</string>\n<key>CFBundleName</key>\n<string>ShareLan</string>\n<key>CFBundleVersion</key>\n<string>0.1.0</string>\n<key>CFBundlePackageType</key>\n<string>APPL</string>\n<key>LSMinimumSystemVersion</key>\n<string>10.15</string>\n</dict>\n</plist>\n' > ../ShareLan.app/Contents/Info.plist
      - uses: actions/upload-artifact@v4
        with:
          name: sharelan-macos-binary
          path: backend/sharelan-macos-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: ShareLan.app
          path: ShareLan.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          cd frontend
          npm install
          npm run build
        shell: bash
      - run: |
          copy-item -path frontend/dist -destination backend/dist -recurse
          cd backend
          $env:CGO_ENABLED=1
          go build -ldflags="-H=windowsgui" -o sharelan-windows-amd64.exe .
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: sharelan-windows
          path: backend/sharelan-windows-amd64.exe
